name: Deploy

on:
  push:
    branches: [main]

# Railway auto-deploys from GitHub on push to main.
# Vercel auto-deploys from GitHub on push to main.
# This workflow is intentionally minimal — CI handles build/test validation.
# Deploy triggers are managed by the platforms themselves.

jobs:
  # Railway: auto-deploys apps/marketplace-api via Dockerfile
  # Vercel:  auto-deploys apps/dashboard and apps/web
  #
  # No deploy actions needed here. See:
  #   - railway.app project settings for API deploy config
  #   - vercel.com project settings for dashboard/web deploy config
  notify:
    name: Deploy notification
    runs-on: ubuntu-latest
    steps:
      - name: Log deploy trigger
        run: echo "Push to main detected. Railway and Vercel will auto-deploy."
